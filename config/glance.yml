pages:
  - name: Home
    hide-desktop-navigation: true
    columns:
      - size: small
        widgets:
          - type: clock

          - type: custom-api
            title: Verse of the Day
            title-url: https://www.bible.com/verse-of-the-day
            cache: 6h
            url: https://api.youversion.com/v1/verse_of_the_days
            headers:
              x-yvp-app-key: ${YOUVERSION_API_KEY}
            options:
              esv-api-key: ${ESV_API_KEY}
            template: |
              {{ $today := now }}
              {{ $dayOfYear := $today.YearDay }}

              {{ $passageId := "" }}
              {{ range .JSON.Array "data" }}
                {{ if eq (.Int "day") $dayOfYear }}
                  {{ $passageId = .String "passage_id" }}
                  {{ break }}
                {{ end }}
              {{ end }}

              {{ if eq $passageId "" }}
                <p class="color-negative">No verse found for today.</p>
              {{ else }}
                {{ $book := printf "%.3s" $passageId }}
                {{ $chapVerse := trimPrefix (printf "%s." $book) $passageId }}
                {{ $chapVerse = replaceAll "." ":" $chapVerse }}
                {{ $ref := printf "%s %s" $book $chapVerse }}
                {{ $apiKey := .Options.StringOr "esv-api-key" "" }}
                {{ $verseResp := newRequest "https://api.esv.org/v3/passage/text/"
                  | withParameter "q" $ref
                  | withParameter "include-headings" "false"
                  | withParameter "include-footnotes" "false"
                  | withParameter "include-verse-numbers" "false"
                  | withParameter "include-short-copyright" "false"
                  | withParameter "include-passage-references" "false"
                  | withHeader "Authorization" (printf "Token %s" $apiKey)
                  | withHeader "Accept" "application/json"
                  | getResponse }}
                {{ if eq $verseResp.Response.StatusCode 200 }}
                  {{ $text := trimSpace ($verseResp.JSON.String "passages.0") }}
                  {{ $canonical := $verseResp.JSON.String "canonical" }}
                  <div style="padding: 4px 0;">
                    <p style="font-style: italic; line-height: 1.6; margin-bottom: 12px;">"{{ $text }}"</p>
                    <p style="text-align: right; font-weight: 600; color: var(--color-primary);">— {{ $canonical }}</p>
                    <p style="text-align: right; font-size: 0.85em; color: var(--color-text-subdue); margin-top: 4px;">English Standard Version</p>
                  </div>
                {{ else }}
                  <p class="color-negative">ESV error ({{ $verseResp.Response.StatusCode }}). Check ESV_API_KEY.</p>
                {{ end }}
              {{ end }}

          - type: custom-api
            title: Notifications
            title-url: http://${TAILSCALE_ADDRESS}:8070
            cache: 1m
            url: http://${SERVER_ADDRESS}:8070/message
            parameters:
              limit: 5
            headers:
              X-Gotify-Key: ${GOTIFY_CLIENT_TOKEN}
            template: |
              {{ $messages := .JSON.Array "messages" }}
              {{ if eq (len $messages) 0 }}
                <p style="color: var(--color-text-subdue);">No notifications.</p>
              {{ else }}
                <ul class="list list-gap-14 collapsible-container" data-collapse-after="5">
                  {{ range $messages }}
                    {{ $priority := .Int "priority" }}
                    {{ $date := .String "date" | parseTime "rfc3339" }}
                    {{ $title := .String "title" }}
                    {{ $message := .String "message" }}
                    <li data-popover-type="text" data-popover-text="{{ $title }}: {{ $message }}">
                      <div class="flex items-center gap-10" style="margin-bottom: 3px;">
                        {{ if ge $priority 8 }}
                          <span class="color-negative">●</span>
                        {{ else if ge $priority 4 }}
                          <span class="color-primary">●</span>
                        {{ else }}
                          <span style="color: var(--color-text-subdue);">●</span>
                        {{ end }}
                        <span class="color-highlight size-h4 grow" style="overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;">{{ $title }}</span>
                        <span class="size-h6" style="color: var(--color-text-subdue); white-space: nowrap;">{{ $date.Format "Jan 2 15:04" }}</span>
                      </div>
                      <p class="size-h5" style="padding-left: 18px; white-space: pre-line; overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;">{{ $message }}</p>
                    </li>
                  {{ end }}
                </ul>
              {{ end }}

          - type: custom-api
            title: Tailscale Devices
            title-url: https://login.tailscale.com/admin/machines
            url: https://api.tailscale.com/api/v2/tailnet/-/devices
            headers:
              Authorization: Bearer ${TAILSCALE_API_KEY}
            cache: 10m
            options:
              collapseAfter: 5
              disableOfflineIndicator: false
              disableUpdateIndicator: false
            template: |
              <style>
                .device-info-container-tailscale { position: relative; overflow: hidden; height: 1.5em; }
                .device-info-tailscale { display: flex; transition: transform 0.2s ease, opacity 0.2s ease; }
                .device-ip-tailscale { position: absolute; top: 0; left: 0; transform: translateY(-100%); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease; }
                .device-info-container-tailscale:hover .device-info-tailscale { transform: translateY(100%); opacity: 0; }
                .device-info-container-tailscale:hover .device-ip-tailscale { transform: translateY(0); opacity: 1; }
                .update-indicator-tailscale { width: 8px; height: 8px; border-radius: 50%; background-color: var(--color-primary); display: inline-block; margin-left: 4px; vertical-align: middle; }
                .offline-indicator-tailscale { width: 8px; height: 8px; border-radius: 50%; background-color: var(--color-negative); display: inline-block; margin-left: 4px; vertical-align: middle; }
                .device-name-container-tailscale { display: flex; align-items: center; gap: 8px; }
                .indicators-container-tailscale { display: flex; align-items: center; gap: 4px; }
              </style>
              <ul class="list list-gap-10 collapsible-container" data-collapse-after="{{ .Options.IntOr "collapseAfter" 5 }}">
                {{ range .JSON.Array "devices" }}
                <li>
                  <div class="flex items-center gap-10">
                    <div class="device-name-container-tailscale grow">
                      <span class="size-h4 block text-truncate color-primary">{{ findMatch "^([^.]+)" (.String "name") }}</span>
                      <div class="indicators-container-tailscale">
                        {{ if and (not ($.Options.BoolOr "disableUpdateIndicator" false)) (.Bool "updateAvailable") }}
                        <span class="update-indicator-tailscale" data-popover-type="text" data-popover-text="Update Available"></span>
                        {{ end }}
                        {{ if not ($.Options.BoolOr "disableOfflineIndicator" false) }}
                        {{ $lastSeen := .String "lastSeen" | parseTime "rfc3339" }}
                        {{ if not ($lastSeen.After (offsetNow "-10s")) }}
                        {{ $lastSeenTimezoned := $lastSeen.In now.Location }}
                        <span class="offline-indicator-tailscale" data-popover-type="text" data-popover-text="Offline - Last seen {{ $lastSeenTimezoned.Format "Jan 2 3:04pm" }}"></span>
                        {{ end }}
                        {{ end }}
                      </div>
                    </div>
                  </div>
                  <div class="device-info-container-tailscale">
                    <ul class="list-horizontal-text device-info-tailscale">
                      <li>{{ .String "os" }}</li>
                      <li>{{ .String "user" }}</li>
                    </ul>
                    <div class="device-ip-tailscale">{{ .String "addresses.0" }}</div>
                  </div>
                </li>
                {{ end }}
              </ul>

      - size: full
        widgets:
          - type: server-stats
            servers:
              - type: local
                name: Unraid
                hide-mountpoints-by-default: true
                mountpoints:
                  "/mnt/disk1":
                    name: Disk 1
                    hide: false
                  "/mnt/disk2":
                    name: Disk 2
                    hide: false
                  "/mnt/disk3":
                    name: Disk 3
                    hide: false

          - type: bookmarks
            groups:
              - title: Hardware
                links:
                  - title: Unraid
                    url: http://${TAILSCALE_ADDRESS}:80
                    icon: di:unraid
                  - title: Router
                    url: https://192.168.1.254
                    icon: di:router
              - title: Torrenting
                links:
                  - title: qBittorrent
                    url: http://${TAILSCALE_ADDRESS}:8080
                    icon: di:qbittorrent
                  - title: Prowlarr
                    url: http://${TAILSCALE_ADDRESS}:9696
                    icon: di:prowlarr
              - title: Media
                links:
                  - title: Plex
                    url: http://app.plex.tv/
                    icon: di:plex
                  - title: Immich
                    url: http://${TAILSCALE_ADDRESS}:9090
                    icon: di:immich
                  - title: Seerr
                    url: http://${TAILSCALE_ADDRESS}:5055
                    icon: di:seerr
              - title: Arr
                links:
                  - title: Radarr
                    url: http://${TAILSCALE_ADDRESS}:7878
                    icon: di:radarr
                  - title: Sonarr
                    url: http://${TAILSCALE_ADDRESS}:8989
                    icon: di:sonarr
                  - title: iPlayarr
                    url: http://${TAILSCALE_ADDRESS}:4404
                    icon: sh:iplayarr
              - title: Network
                links:
                  - title: Nginx Proxy Manager
                    url: http://${TAILSCALE_ADDRESS}:1880
                    icon: di:nginx-proxy-manager
                  - title: DuckDNS
                    url: https://www.duckdns.org/
                    icon: di:duckdns
                  - title: AdGuard Home
                    url: http://adguard-home/
                    icon: di:adguard-home
              - title: Monitoring
                links:
                  - title: Scrutiny
                    url: http://${TAILSCALE_ADDRESS}:8888
                    icon: sh:scrutiny-light
                  - title: Tautulli
                    url: http://${TAILSCALE_ADDRESS}:8181
                    icon: di:tautulli
                  - title: Uptime Kuma
                    url: http://${TAILSCALE_ADDRESS}:3001
                    icon: di:uptime-kuma
                  - title: Gotify
                    url: http://${TAILSCALE_ADDRESS}:8070
                    icon: di:gotify
              - title: Tools
                links:
                  - title: FileBrowser
                    url: http://${TAILSCALE_ADDRESS}:8125
                    icon: di:filebrowser
                  - title: Perlite
                    url: http://${TAILSCALE_ADDRESS}:8765
                    icon: di:perlite
                  - title: Stirling PDF
                    url: http://${TAILSCALE_ADDRESS}:8081
                    icon: sh:stirling-pdf
              - title: External
                links:
                  - title: Tailscale
                    url: https://login.tailscale.com/admin
                    icon: di:tailscale-light
                  - title: Cloudflare
                    url: https://dash.cloudflare.com/
                    icon: di:cloudflare
              - title: RSS
                links:
                  - title: FreshRSS
                    url: http://${TAILSCALE_ADDRESS}:88
                    icon: sh:freshrss
                  - title: FiveFilters
                    url: http://${TAILSCALE_ADDRESS}:50000
                    icon: si:rss

          - type: rss
            title: Feeds
            style: detailed-list
            limit: 5
            feeds:
              - url: https://rss.beehiiv.com/feeds/wnEIOSd99q.xml
                title: Slothbytes
              - url: https://selfh.st/rss/
                title: Selfh.st
              - url: http://${SERVER_ADDRESS}:50000/makefulltextfeed.php?url=https%3A%2F%2Fchristitus.com%2Findex.xml&max=200&links=preserve&exc=
                title: ChrisTitus
              - url: http://${SERVER_ADDRESS}:50000/makefulltextfeed.php?url=https%3A%2F%2Fcode.visualstudio.com%2Ffeed.xml&max=200&links=preserve&exc=
                title: VSCode
              - url: http://${SERVER_ADDRESS}:50000/makefulltextfeed.php?url=https%3A%2F%2Fstories.strava.com%2Frss&max=200&links=preserve&exc=
                title: Strava

      - size: small
        widgets:
          - type: custom-api
            title: Uptime Kuma
            title-url: http://${TAILSCALE_ADDRESS}:3001
            url: http://${SERVER_ADDRESS}:3001/api/status-page/${UPTIME_KUMA_STATUS_SLUG}
            subrequests:
              heartbeats:
                url: http://${SERVER_ADDRESS}:3001/api/status-page/heartbeat/${UPTIME_KUMA_STATUS_SLUG}
            cache: 10m
            template: |
              {{ $hb := .Subrequest "heartbeats" }}
              {{ if not (.JSON.Exists "publicGroupList") }}
              <p class="color-negative">Error reading response</p>
              {{ else if eq (len (.JSON.Array "publicGroupList")) 0 }}
              <p>No monitors found</p>
              {{ else }}
              <ul class="dynamic-columns list-gap-8">
                {{ range .JSON.Array "publicGroupList" }}
                {{ range .Array "monitorList" }}
                {{ $id := .String "id" }}
                {{ $hbArray := $hb.JSON.Array (print "heartbeatList." $id) }}
                <div class="flex items-center gap-12">
                  <a class="size-title-dynamic color-highlight text-truncate block grow" href="http://${TAILSCALE_ADDRESS}:3001/dashboard/{{ $id }}" target="_blank" rel="noreferrer">{{ .String "name" }}</a>
                  {{ if gt (len $hbArray) 0 }}
                    {{ $latest := index $hbArray (sub (len $hbArray) 1) }}
                    {{ if eq ($latest.Int "status") 1 }}
                    <div>{{ $latest.Int "ping" }}ms</div>
                    <div class="monitor-site-status-icon-compact" title="OK">
                      <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"></path></svg>
                    </div>
                    {{ else }}
                    <div><span class="color-negative">DOWN</span></div>
                    <div class="monitor-site-status-icon-compact">
                      <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"></path></svg>
                    </div>
                    {{ end }}
                  {{ else }}
                  <div><span class="color-negative">No data</span></div>
                  {{ end }}
                </div>
                {{ end }}
                {{ end }}
              </ul>
              {{ end }}

          - type: custom-api
            title: qBittorrent
            cache: 10s
            options:
              view: "detailed"
              mode: "default"
            subrequests:
              transfer:
                url: http://${SERVER_ADDRESS}:8080/api/v2/transfer/info
              seeding:
                url: http://${SERVER_ADDRESS}:8080/api/v2/torrents/info
                parameters:
                  filter: seeding
              leeching:
                url: http://${SERVER_ADDRESS}:8080/api/v2/torrents/info
                parameters:
                  filter: downloading
            template: |
              {{ $transfer := .Subrequest "transfer" }}
              {{ $seeding := .Subrequest "seeding" }}
              {{ $leeching := .Subrequest "leeching" }}
              {{ if and (eq $transfer.Response.StatusCode 200) (eq $seeding.Response.StatusCode 200) (eq $leeching.Response.StatusCode 200) }}
              {{ $isDetailed := eq (.Options.StringOr "view" "detailed") "detailed" }}
              {{ $mode := .Options.StringOr "mode" "default" }}
              {{ if $isDetailed }}
              <div class="list" style="--list-gap: 15px;">
                <div class="flex justify-between text-center">
                  <div>
                    {{ $dlSpeed := $transfer.JSON.Float "dl_info_speed" }}
                    {{ if lt $dlSpeed 1048576.0 }}
                      <div class="color-highlight size-h3">{{ printf "%.0f KiB/s" (div $dlSpeed 1024.0) }}</div>
                    {{ else }}
                      <div class="color-highlight size-h3">{{ printf "%.1f MiB/s" (div $dlSpeed 1048576.0) }}</div>
                    {{ end }}
                    <div class="size-h6">DOWNLOADING</div>
                  </div>
                  {{ if eq $mode "upload" }}
                  <div>
                    {{ $ulSpeed := $transfer.JSON.Float "up_info_speed" }}
                    <div class="color-highlight size-h3">{{ printf "%.1f MB/s" (div $ulSpeed 1000000.0) }}</div>
                    <div class="size-h6">UPLOADING</div>
                  </div>
                  {{ end }}
                  <div>
                    <div class="color-highlight size-h3">{{ len ($seeding.JSON.Array "") }}</div>
                    <div class="size-h6">SEEDING</div>
                  </div>
                  {{ if eq $mode "default" }}
                  <div>
                    <div class="color-highlight size-h3">{{ len ($leeching.JSON.Array "") }}</div>
                    <div class="size-h6">LEECHING</div>
                  </div>
                  {{ end }}
                </div>
                {{ $downloadingTorrents := $leeching.JSON.Array "" }}
                {{ if gt (len $downloadingTorrents) 0 }}
                <div style="margin-top: 15px;">
                  <ul class="list collapsible-container" data-collapse-after="0" style="--list-gap: 15px;">
                    {{ range $t := $downloadingTorrents }}
                      {{ $state := $t.String "state" }}
                      {{ $icon := "?" }}
                      {{ if ge ($t.Int "completed") ($t.Int "size") }}{{ $icon = "✔" }}
                      {{ else if eq $state "downloading" "forcedDL" }}{{ $icon = "↓" }}
                      {{ else if eq $state "pausedDL" "stoppedDL" "stalledDL" "queuedDL" }}{{ $icon = "❚❚" }}
                      {{ else if eq $state "error" "missingFiles" }}{{ $icon = "!" }}
                      {{ end }}
                      <li class="flex items-center" style="gap: 10px;">
                        <div class="size-h4" style="flex-shrink: 0;">{{ $icon }}</div>
                        <div style="flex-grow: 1; min-width: 0;">
                          <div class="text-truncate color-highlight">{{ $t.String "name" }}</div>
                          <div style="background: rgba(128, 128, 128, 0.2); border-radius: 5px; height: 6px; margin-top: 5px; overflow: hidden;">
                            <div style="width: {{ $t.Float "progress" | mul 100 }}%; background-color: var(--color-positive); height: 100%; border-radius: 5px;"></div>
                          </div>
                        </div>
                        <div style="flex-shrink: 0; text-align: right; width: 80px;">
                          {{ $dlSpeed := $t.Float "dlspeed" }}
                          <div class="size-sm color-paragraph">
                            {{ if lt $dlSpeed 1024.0 }}--{{ else if lt $dlSpeed 1048576.0 }}{{ printf "%.0f KiB/s" (div $dlSpeed 1024.0) }}{{ else }}{{ printf "%.1f MiB/s" (div $dlSpeed 1048576.0) }}{{ end }}
                          </div>
                          {{ $eta := $t.Int "eta" }}
                          <div class="size-sm color-paragraph">
                            {{ if eq $eta 8640000 }}∞{{ else if gt $eta 3600 }}{{ printf "%dh %dm" (div $eta 3600) (mod (div $eta 60) 60) }}{{ else if gt $eta 0 }}{{ printf "%dm" (div $eta 60) }}{{ else }}--{{ end }}
                          </div>
                        </div>
                      </li>
                    {{ end }}
                  </ul>
                </div>
                {{ end }}
              </div>
              {{ else }}
              <div class="flex justify-between text-center">
                <div>
                  {{ $dlSpeed := $transfer.JSON.Float "dl_info_speed" }}
                  {{ if lt $dlSpeed 1048576.0 }}
                    <div class="color-highlight size-h3">{{ printf "%.0f KiB/s" (div $dlSpeed 1024.0) }}</div>
                  {{ else }}
                    <div class="color-highlight size-h3">{{ printf "%.1f MiB/s" (div $dlSpeed 1048576.0) }}</div>
                  {{ end }}
                  <div class="size-h6">DOWNLOADING</div>
                </div>
                <div>
                  <div class="color-highlight size-h3">{{ len ($seeding.JSON.Array "") }}</div>
                  <div class="size-h6">SEEDING</div>
                </div>
                <div>
                  <div class="color-highlight size-h3">{{ len ($leeching.JSON.Array "") }}</div>
                  <div class="size-h6">LEECHING</div>
                </div>
              </div>
              {{ end }}
              {{ else }}
              <div class="color-negative text-center">
                <p>Error fetching qBittorrent data.</p>
                <p class="size-sm">Check QBITTORRENT_IP and whitelist settings in qBittorrent.</p>
              </div>
              {{ end }}

          - type: custom-api
            title: Indexers
            title-url: http://${TAILSCALE_ADDRESS}:9696
            cache: 1m
            options:
              base-url: http://${SERVER_ADDRESS}:9696
              api-key: ${PROWLARR_KEY}
            template: |
              {{ $apiBaseUrl := .Options.StringOr "base-url" "" }}
              {{ $key := .Options.StringOr "api-key" "" }}
              {{ $collapseAfter := .Options.IntOr "collapse-after" 5 }}

              {{ if or (eq $apiBaseUrl "") (eq $key "") }}
                <div class="widget-error-header">
                    <div class="color-negative size-h3">ERROR</div>
                    <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
                    </svg>
                  </div>
                  <p class="break-all">
                    Some options are not set or malformed
                      <table style="border-spacing: 1rem;">
                        <tr>
                          <td><strong>base-url</strong> <br/> should include http(s):// and port if needed</td>
                        </tr>
                        <tr>
                          <td><strong>PROWLARR_KEY</strong> <br/> must be set (Settings > General > Security)</td>
                        </tr>
                      </table>
                  </p>
              {{ else }}

                {{ $indexUrl := printf "%s/api/v1/indexer" $apiBaseUrl }}

                {{ $indexData := newRequest $indexUrl
                  | withHeader "Accept" "application/json"
                  | withHeader "X-Api-Key" $key
                  | getResponse }}

                {{ if eq $indexData.Response.StatusCode 200 }}
                  <style>
                    .prowlarr-indexers .prowlarr-index-item
                    {
                      align-items: center;        
                    }
                    .prowlarr-indexers .prowlarr-index-item > span{
                      text-transform: capitalize;
                      background: var(--color-background);
                      padding: 0.2rem 0.75rem;
                      border: 1px solid var(--color-widget-content-border);
                      border-radius: var(--border-radius);
                      font-size: var(--font-size-tiny);
                    }
                  </style>

                  <ul class="prowlarr-indexers list list-gap-10 collapsible-container" data-collapse-after="{{ $collapseAfter }}">

                    {{ range $indexData.JSON.Array "" }}
                      <li class="flex items-center gap-12 prowlarr-index-item">
                        <a href="{{ $apiBaseUrl }}" target="_blank" class="size-title-dynamic color-highlight text-truncate block grow">{{ .String "name" }}</a>
                        <span>{{ .String "privacy" }}</span>
                        {{ if .Bool "enable" }}
                          <div class="margin-left-auto shrink-0" data-popover-type="text" data-popover-position="above" data-popover-text="Enabled" aria-label="Enabled">
                            <div class="monitor-site-status-icon-compact" title="Enabled">
                              <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"></path>
                              </svg>
                            </div>
                          </div>
                        {{ else }}
                          <div class="margin-left-auto shrink-0" data-popover-type="text" data-popover-position="above" data-popover-text="Disabled" aria-label="Disabled">
                            <div class="monitor-site-status-icon-compact" title="Disabled">
                              <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"></path>
                              </svg>
                            </div>
                          </div>
                        {{ end }}
                        
                      </li>
                    {{ end }}

                  </ul>
                {{ else }}
                  <p>Failed to fetch data (Status: {{ $indexData.Response.StatusCode }})</p>
                {{ end }}

              {{ end }}

          - type: custom-api
            title: Immich stats
            cache: 1d
            url: http://${SERVER_ADDRESS}:9090/api/server/statistics
            headers:
              x-api-key: ${IMMICH_API_KEY}
              Accept: application/json
            template: |
              <div class="flex justify-between text-center">
                <div>
                    <div class="color-highlight size-h3">{{ .JSON.Int "photos" | formatNumber }}</div>
                    <div class="size-h6">PHOTOS</div>
                </div>
                <div>
                    <div class="color-highlight size-h3">{{ .JSON.Int "videos" | formatNumber }}</div>
                    <div class="size-h6">VIDEOS</div>
                </div>
                <div>
                    <div class="color-highlight size-h3">{{ div (.JSON.Int "usage" | toFloat) 1073741824 | toInt | formatNumber }}GB</div>
                    <div class="size-h6">USAGE</div>
                </div>
              </div>

          - type: custom-api
            title: Now Playing
            cache: 5m
            options:
              media-server: "tautulli"
              base-url: http://${SERVER_ADDRESS}:8181
              api-key: ${TAUTULLI_KEY}
              compact: true
              play-state: "indicator"
              show-thumbnail: false
              show-paused: false
              show-progress-bar: false
              show-progress-info: true
              time-format: "15:04"
            template: |
              {{ $mediaServer := .Options.StringOr "media-server" "" }}
              {{ $baseURL := .Options.StringOr "base-url" "" }}
              {{ $apiKey := .Options.StringOr "api-key" "" }}
              {{ define "errorMsg" }}
                <div class="widget-error-header">
                  <div class="color-negative size-h3">ERROR</div>
                </div>
                <p class="break-all">{{ . }}</p>
              {{ end }}
              {{ if or (eq $mediaServer "") (eq $baseURL "") (eq $apiKey "") }}
                {{ template "errorMsg" "Some required options are not set" }}
              {{ else }}
              {{ $isSmallColumn := .Options.BoolOr "small-column" false }}
              {{ $isCompact := .Options.BoolOr "compact" true }}
              {{ $playState := .Options.StringOr "play-state" "indicator" }}
              {{ $showThumbnail := .Options.BoolOr "show-thumbnail" false }}
              {{ $showPaused := .Options.BoolOr "show-paused" false }}
              {{ $showProgressBar := .Options.BoolOr "show-progress-bar" false }}
              {{ $showProgressInfo := .Options.BoolOr "show-progress-info" true }}
              {{ $timeFormat := .Options.StringOr "time-format" "15:04" }}
              {{ $sessionsCall := "" }}
              {{ $sessions := "" }}
              {{ $activeSessions := 0 }}
              {{ if eq $mediaServer "tautulli" }}
                {{ $sessionsRequestURL := concat $baseURL "/api/v2" }}
                {{ $sessionsCall = newRequest $sessionsRequestURL | withParameter "apikey" $apiKey | withParameter "cmd" "get_activity" | withHeader "Accept" "application/json" | getResponse }}
                {{ if eq $sessionsCall.Response.StatusCode 200 }}
                  {{ $sessions = $sessionsCall.JSON.Array "response.data.sessions" }}
                  {{ $activeSessions = len $sessions }}
                {{ else }}
                  {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
                {{ end }}
              {{ else if eq $mediaServer "plex" }}
                {{ $sessionsRequestURL := concat $baseURL "/status/sessions" }}
                {{ $sessionsCall = newRequest $sessionsRequestURL | withHeader "Accept" "application/json" | withHeader "X-Plex-Token" $apiKey | getResponse }}
                {{ if $sessionsCall.JSON.Exists "MediaContainer" }}
                  {{ $sessions = $sessionsCall.JSON.Array "MediaContainer.Metadata" }}
                  {{ $activeSessions = len $sessions }}
                {{ else }}
                  {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
                {{ end }}
              {{ end }}
              {{ if and (eq $sessionsCall.Response.StatusCode 200) (eq $activeSessions 0) }}
                <p>Nothing is playing right now.</p>
              {{ else }}
              <style>
                .media-server-session-container--grid { display: flex; flex-direction: column; }
                .media-server-progress-container { height: 1rem; max-width: 32rem; border: 1px solid var(--color-text-base); border-radius: var(--border-radius); overflow: hidden; }
                .media-server-progress-bar { height: 100%; background: var(--color-primary); border-radius: 3px; transition: width 1s linear; }
                @keyframes progress-animation { to { width: 100%; } }
              </style>
              <div class="gap-10 {{ if $isSmallColumn }}flex flex-column{{ else }}media-server-session-container--grid{{ end }}">
              {{ range $i, $session := $sessions }}
                {{ $isPlaying := false }}
                {{ $state := "playing" }}
                {{ $isMovie := false }}
                {{ $isShows := false }}
                {{ $isMusic := false }}
                {{ $userName := "" }}
                {{ $title := "" }}
                {{ $showTitle := "" }}
                {{ $showSeason := "" }}
                {{ $showEpisode := "" }}
                {{ $artist := "" }}
                {{ $albumTitle := "" }}
                {{ $now := now | formatTime "15:04:05" | parseLocalTime "15:04:05" }}
                {{ $duration := 0 }}
                {{ $offset := 0 }}
                {{ $remainingSeconds := 0 }}
                {{ if eq $mediaServer "tautulli" }}
                  {{ $isPlaying = eq ($session.String "state") "playing" }}
                  {{ if not $isPlaying }}{{ $state = "paused" }}{{ end }}
                  {{ $mediaType := $session.String "media_type" }}
                  {{ $isMovie = eq $mediaType "movie" }}
                  {{ $isShows = eq $mediaType "episode" }}
                  {{ $isMusic = eq $mediaType "track" }}
                  {{ $userName = $session.String "user" }}
                  {{ $title = $session.String "title" }}
                  {{ $showTitle = $session.String "grandparent_title" }}
                  {{ $showSeason = $session.String "parent_media_index" }}
                  {{ $showEpisode = $session.String "media_index" }}
                  {{ $artist = $session.String "grandparent_title" }}
                  {{ $albumTitle = $session.String "parent_title" }}
                  {{ $duration = $session.Float "duration" }}
                  {{ $offset = $session.Float "view_offset" }}
                  {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                {{ else if eq $mediaServer "plex" }}
                  {{ $isPlaying = eq ($session.String "Player.state") "playing" }}
                  {{ if not $isPlaying }}{{ $state = "paused" }}{{ end }}
                  {{ $mediaType := $session.String "type" }}
                  {{ $isMovie = eq $mediaType "movie" }}
                  {{ $isShows = eq $mediaType "episode" }}
                  {{ $isMusic = eq $mediaType "track" }}
                  {{ $userName = $session.String "User.title" }}
                  {{ $title = $session.String "title" }}
                  {{ $showTitle = $session.String "grandparentTitle" }}
                  {{ $showSeason = $session.String "parentIndex" }}
                  {{ $showEpisode = $session.String "index" }}
                  {{ $artist = $session.String "grandparentTitle" }}
                  {{ $albumTitle = $session.String "parentTitle" }}
                  {{ $duration = $session.Float "duration" }}
                  {{ $offset = $session.Float "viewOffset" }}
                  {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                {{ end }}
                {{ $progress := mul 100 (div $offset $duration) | toInt }}
                {{ $endTime := $now.Add (duration (printf "%ds" $remainingSeconds)) | formatTime $timeFormat }}
                {{ if or $isPlaying $showPaused }}
                <div class="card gap-5">
                  <div class="flex items-center gap-10 size-h3">
                    <span class="color-primary">{{ $userName }}</span>
                    {{ if eq $playState "indicator" }}
                    <style>
                      .media-server-indicator { height: .7rem; width: .7rem; border-radius: 100%; {{ if $isPlaying }}animation: pulse 5s infinite; background: var(--color-primary);{{ else }}background: var(--color-text-base-muted);{{ end }} }
                      @keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--color-text-base); } 40% { box-shadow: 0 0 0 4px transparent; } 100% { box-shadow: 0 0 0 4px transparent; } }
                    </style>
                    <div class="media-server-indicator"></div>
                    {{ end }}
                  </div>
                  <hr class="margin-bottom-5" />
                  <ul class="flex flex-column grow justify-evenly" style="width: 0; min-width: 100%;">
                    {{ if $isCompact }}
                      {{ if $isShows }}
                        <ul class="list-horizontal-text flex-nowrap">
                          <li class="shrink-0">{{ concat "S" $showSeason "E" $showEpisode }}</li>
                          <li class="text-truncate">{{ $showTitle }}</li>
                        </ul>
                      {{ else if $isMusic }}
                        <ul class="list-horizontal-text flex-nowrap">
                          <li class="shrink-0">{{ $artist }}</li>
                          <li class="text-truncate">{{ $albumTitle }}</li>
                        </ul>
                      {{ end }}
                      <li class="text-truncate">{{ $title }}</li>
                    {{ else }}
                      {{ if $isShows }}<li>{{ $showTitle }}</li><li>{{ concat "S" $showSeason "E" $showEpisode }}</li>{{ else if $isMusic }}<li>{{ $artist }}</li><li>{{ $albumTitle }}</li>{{ end }}
                      <li>{{ $title }}</li>
                    {{ end }}
                    <li>
                      {{ if and $isPlaying $showProgressBar }}
                        <div class="flex gap-10 items-center">
                          <div class="media-server-progress-container grow">
                            <div class="media-server-progress-bar" style="width: {{ $progress }}%; animation: progress-animation {{ $remainingSeconds }}s linear forwards;"></div>
                          </div>
                          {{ if $showProgressInfo }}<p>{{ $endTime }}</p>{{ end }}
                        </div>
                      {{ end }}
                    </li>
                  </ul>
                </div>
                {{ end }}
              {{ end }}
              </div>
              {{ end }}
              {{ end }}

          - type: custom-api
            title: Upcoming Episodes
            title-url: http://${TAILSCALE_ADDRESS}:8989/calendar
            cache: 1h
            options:
              api-key: ${SONARR_KEY}
            template: |
              {{ $apiKey := .Options.StringOr "api-key" "" }}
              {{ $start := now | formatTime "2006-01-02" }}
              {{ $end := offsetNow "+336h" | formatTime "2006-01-02" }}
              {{ $calResp := newRequest "http://${SERVER_ADDRESS}:8989/api/v3/calendar"
                | withParameter "start" $start
                | withParameter "end" $end
                | withHeader "X-Api-Key" $apiKey
                | getResponse }}
              {{ $seriesResp := newRequest "http://${SERVER_ADDRESS}:8989/api/v3/series"
                | withHeader "X-Api-Key" $apiKey
                | getResponse }}
              {{ if eq $calResp.Response.StatusCode 200 }}
                {{ $episodes := $calResp.JSON.Array "" }}
                {{ if eq (len $episodes) 0 }}
                  <p style="color: var(--color-text-subdue);">No upcoming episodes in the next 14 days.</p>
                {{ else }}
                  <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
                    {{ range $episodes }}
                      {{ $seriesId := .Int "seriesId" }}
                      {{ $showTitle := "" }}
                      {{ range $seriesResp.JSON.Array "" }}
                        {{ if eq (.Int "id") $seriesId }}
                          {{ $showTitle = .String "title" }}
                        {{ end }}
                      {{ end }}
                      {{ $airDate := .String "airDateUtc" | parseTime "rfc3339" }}
                      {{ $airDateLocal := $airDate.In now.Location }}
                      <li>
                        <div class="flex items-center gap-8" style="margin-bottom: 3px;">
                          <span class="color-highlight size-h4 grow text-truncate">{{ $showTitle }}</span>
                          <span class="size-h6" style="color: var(--color-text-subdue); white-space: nowrap;">{{ if $airDate.Before (offsetNow "+168h") }}{{ $airDateLocal.Format "Monday · 15:04" }}{{ else }}{{ $airDateLocal.Format "Jan 2 · 15:04" }}{{ end }}</span>
                        </div>
                        <p class="size-h5" style="color: var(--color-text-subdue);">S{{ printf "%02d" (.Int "seasonNumber") }}E{{ printf "%02d" (.Int "episodeNumber") }} · {{ .String "title" }}</p>
                      </li>
                    {{ end }}
                  </ul>
                {{ end }}
              {{ else }}
                <p class="color-negative">Sonarr error ({{ $calResp.Response.StatusCode }})</p>
              {{ end }}

          - type: custom-api
            title: Seerr Requests
            title-url: http://${TAILSCALE_ADDRESS}:5055/requests
            url: http://${SERVER_ADDRESS}:5055/api/v1/request/count
            cache: 1h
            headers:
              accept: "application/json"
              x-api-key: ${SEERR_API_KEY}
            template: |
              {{ if eq .Response.StatusCode 200 }}
              <div class="flex justify-evenly text-center">
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "total" | formatNumber }}</div>
                  <div class="size-h3">Total</div>
                </div>
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "movie" | formatNumber }}</div>
                  <div class="size-h3">Movies</div>
                </div>
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "tv" | formatNumber }}</div>
                  <div class="size-h3">TV Series</div>
                </div>
              </div>
              <div class="flex justify-evenly text-center margin-top-20">
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "pending" | formatNumber }}</div>
                  <div class="size-h3">Pending</div>
                </div>
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "approved" | formatNumber }}</div>
                  <div class="size-h3">Approved</div>
                </div>
                <div>
                  <div class="color-highlight size-h1">{{ .JSON.Int "available" | formatNumber }}</div>
                  <div class="size-h3">Available</div>
                </div>
              </div>
              {{ end }}
